name: Deploy to S3 and Invalidate Cloudfront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: 의존성 설치
        working-directory: 231
        run: npm install

      - name: 빌드하기
        working-directory: 231
        run: npm run build

      - name: Debugging
        working-directory: 231
        run: |
          ls
          cd dist
          ls

      - name: AWS Resource에 접근할 수 있게 AWS 인증 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: S3 기존 파일들 전체 삭제
        run: |
          aws s3 rm --recursive s3://bokseub

      - name: S3에 빌드 파일 업로드
        run: |
          aws s3 cp ./231/dist s3://bokseub/ --recursive

      - name: Cloudfront 캐시 무효화
        run: |
          aws cloudfront create-invalidation --distribution-id E6RZSQKQH57FT --paths "/*"
